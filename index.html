<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris - Light & Dark Mode</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #2563eb;
      --board-bg: #eef2ff;
      --ghost: rgba(37, 99, 235, 0.25);
      --shadow: 0 10px 35px rgba(17, 24, 39, 0.15);
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --panel: #111827;
      --text: #f9fafb;
      --muted: #9ca3af;
      --border: #374151;
      --accent: #60a5fa;
      --board-bg: #0b1222;
      --ghost: rgba(96, 165, 250, 0.3);
      --shadow: 0 10px 35px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.15), transparent 45%),
                  radial-gradient(circle at 90% 90%, rgba(147, 51, 234, 0.15), transparent 40%),
                  var(--bg);
      color: var(--text);
      transition: background 0.2s ease, color 0.2s ease;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(100%, 1180px);
      display: grid;
      grid-template-columns: minmax(320px, 520px) minmax(280px, 1fr);
      gap: 24px;
      align-items: start;
    }

    .panel {
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .game-panel {
      padding: 16px;
      display: grid;
      place-items: center;
    }

    #board {
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--board-bg);
      width: min(42vh, 420px);
      height: min(84vh, 840px);
      max-height: 78vh;
      aspect-ratio: 1 / 2;
    }

    .info-panel {
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2.2vw, 1.8rem);
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    button {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.2s ease;
    }

    button:hover { transform: translateY(-1px); border-color: var(--accent); }
    button:active { transform: translateY(0); }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(80px, 1fr));
      gap: 10px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
    }

    .card small { color: var(--muted); display: block; margin-bottom: 4px; }
    .card strong { font-size: 1.2rem; }

    .next-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    #next {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--board-bg);
      width: 120px;
      height: 120px;
    }

    .controls {
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.95rem;
      margin: 0;
      padding-left: 16px;
    }

    .status {
      font-weight: 600;
      color: var(--accent);
      min-height: 1.2rem;
    }

    @media (max-width: 1024px) {
      .app {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .info-panel {
        width: min(100%, 620px);
      }

      #board { width: min(56vw, 420px); }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel game-panel">
      <canvas id="board" width="300" height="600" aria-label="Tetris Board"></canvas>
    </section>

    <section class="panel info-panel">
      <div class="topbar">
        <div>
          <h1>Tetris</h1>
          <p class="subtitle">Self-contained browser game with light/dark mode</p>
        </div>
        <button id="themeBtn" aria-label="Toggle light and dark mode">☀️ / 🌙 Theme</button>
      </div>

      <div class="stats">
        <div class="card"><small>Score</small><strong id="score">0</strong></div>
        <div class="card"><small>Level</small><strong id="level">1</strong></div>
        <div class="card"><small>Lines</small><strong id="lines">0</strong></div>
      </div>

      <div class="next-wrap">
        <div>
          <p class="subtitle" style="margin:0 0 8px">Next piece</p>
          <canvas id="next" width="120" height="120" aria-label="Next piece preview"></canvas>
        </div>
        <div>
          <button id="startBtn">Start / Restart</button>
          <p id="status" class="status">Press Start to begin.</p>
        </div>
      </div>

      <ul class="controls">
        <li><strong>←/→</strong> Move</li>
        <li><strong>↓</strong> Soft drop</li>
        <li><strong>↑</strong> Rotate</li>
        <li><strong>Space</strong> Hard drop</li>
        <li><strong>P</strong> Pause</li>
      </ul>
    </section>
  </main>

  <script>
    const COLS = 10;
    const ROWS = 20;
    const BLOCK = 30;

    const boardCanvas = document.getElementById('board');
    const nextCanvas = document.getElementById('next');
    const bctx = boardCanvas.getContext('2d');
    const nctx = nextCanvas.getContext('2d');

    boardCanvas.width = COLS * BLOCK;
    boardCanvas.height = ROWS * BLOCK;

    const COLORS = {
      I: '#22d3ee', O: '#facc15', T: '#a855f7', S: '#22c55e',
      Z: '#ef4444', J: '#3b82f6', L: '#f97316'
    };

    const SHAPES = {
      I: [[1,1,1,1]],
      O: [[1,1],[1,1]],
      T: [[0,1,0],[1,1,1]],
      S: [[0,1,1],[1,1,0]],
      Z: [[1,1,0],[0,1,1]],
      J: [[1,0,0],[1,1,1]],
      L: [[0,0,1],[1,1,1]],
    };

    let state;
    let dropCounter = 0;
    let lastTime = 0;
    let animId = null;

    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level');
    const linesEl = document.getElementById('lines');
    const statusEl = document.getElementById('status');
    const themeBtn = document.getElementById('themeBtn');

    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    }

    function randomType() {
      const types = Object.keys(SHAPES);
      return types[(Math.random() * types.length) | 0];
    }

    function createPiece(type = randomType()) {
      return {
        type,
        shape: SHAPES[type].map(r => [...r]),
        color: COLORS[type],
        x: ((COLS / 2) | 0) - 1,
        y: 0,
      };
    }

    function resetGame() {
      state = {
        board: createBoard(),
        current: createPiece(),
        next: createPiece(),
        score: 0,
        lines: 0,
        level: 1,
        paused: false,
        over: false,
      };
      dropCounter = 0;
      lastTime = 0;
      updateStats();
      statusEl.textContent = 'Game running.';
      if (animId) cancelAnimationFrame(animId);
      animId = requestAnimationFrame(loop);
    }

    function collide(piece, board, ox = 0, oy = 0, shape = piece.shape) {
      for (let y = 0; y < shape.length; y++) {
        for (let x = 0; x < shape[y].length; x++) {
          if (!shape[y][x]) continue;
          const nx = piece.x + x + ox;
          const ny = piece.y + y + oy;
          if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
          if (ny >= 0 && board[ny][nx]) return true;
        }
      }
      return false;
    }

    function merge() {
      const { board, current } = state;
      current.shape.forEach((row, y) => {
        row.forEach((v, x) => {
          if (v && current.y + y >= 0) board[current.y + y][current.x + x] = current.color;
        });
      });
    }

    function rotate(shape) {
      const rows = shape.length;
      const cols = shape[0].length;
      const out = Array.from({ length: cols }, () => Array(rows).fill(0));
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) out[x][rows - 1 - y] = shape[y][x];
      }
      return out;
    }

    function clearLines() {
      let cleared = 0;
      outer: for (let y = ROWS - 1; y >= 0; y--) {
        for (let x = 0; x < COLS; x++) if (!state.board[y][x]) continue outer;
        const row = state.board.splice(y, 1)[0].fill(0);
        state.board.unshift(row);
        cleared++;
        y++;
      }
      if (cleared) {
        const points = [0, 100, 300, 500, 800][cleared] || 1000;
        state.score += points * state.level;
        state.lines += cleared;
        state.level = Math.min(20, 1 + Math.floor(state.lines / 10));
        updateStats();
      }
    }

    function spawnNext() {
      state.current = state.next;
      state.current.x = ((COLS - state.current.shape[0].length) / 2) | 0;
      state.current.y = -1;
      state.next = createPiece();
      if (collide(state.current, state.board)) {
        state.over = true;
        statusEl.textContent = 'Game over. Press Start to play again.';
      }
    }

    function hardDrop() {
      while (!collide(state.current, state.board, 0, 1)) {
        state.current.y++;
        state.score += 2;
      }
      lockPiece();
      updateStats();
    }

    function lockPiece() {
      merge();
      clearLines();
      spawnNext();
    }

    function move(dx) {
      if (!collide(state.current, state.board, dx, 0)) state.current.x += dx;
    }

    function softDrop() {
      if (!collide(state.current, state.board, 0, 1)) {
        state.current.y++;
        state.score += 1;
      } else {
        lockPiece();
      }
      updateStats();
    }

    function rotateCurrent() {
      const r = rotate(state.current.shape);
      const kicks = [0, -1, 1, -2, 2];
      for (const k of kicks) {
        if (!collide(state.current, state.board, k, 0, r)) {
          state.current.shape = r;
          state.current.x += k;
          return;
        }
      }
    }

    function ghostY() {
      let y = state.current.y;
      while (!collide(state.current, state.board, 0, y - state.current.y + 1)) y++;
      return y;
    }

    function drawCell(ctx, x, y, color, size = BLOCK) {
      ctx.fillStyle = color;
      ctx.fillRect(x * size, y * size, size, size);
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.strokeRect(x * size, y * size, size, size);
    }

    function drawBoard() {
      const theme = document.documentElement.dataset.theme;
      bctx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);
      bctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--board-bg');
      bctx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);

      state.board.forEach((row, y) => row.forEach((color, x) => color && drawCell(bctx, x, y, color)));

      const gy = ghostY();
      state.current.shape.forEach((row, y) => {
        row.forEach((v, x) => {
          if (!v) return;
          bctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--ghost');
          bctx.fillRect((state.current.x + x) * BLOCK, (gy + y) * BLOCK, BLOCK, BLOCK);
        });
      });

      state.current.shape.forEach((row, y) => {
        row.forEach((v, x) => {
          if (v) drawCell(bctx, state.current.x + x, state.current.y + y, state.current.color);
        });
      });

      if (theme === 'light') {
        bctx.strokeStyle = 'rgba(17,24,39,0.2)';
      }
    }

    function drawNext() {
      nctx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
      const s = state.next.shape;
      const size = 24;
      const ox = ((nextCanvas.width - s[0].length * size) / 2) | 0;
      const oy = ((nextCanvas.height - s.length * size) / 2) | 0;
      s.forEach((row, y) => row.forEach((v, x) => {
        if (!v) return;
        nctx.fillStyle = state.next.color;
        nctx.fillRect(ox + x * size, oy + y * size, size, size);
        nctx.strokeStyle = 'rgba(255,255,255,0.2)';
        nctx.strokeRect(ox + x * size, oy + y * size, size, size);
      }));
    }

    function updateStats() {
      scoreEl.textContent = state.score;
      levelEl.textContent = state.level;
      linesEl.textContent = state.lines;
    }

    function loop(time = 0) {
      if (!state || state.over) {
        drawBoard();
        drawNext();
        return;
      }
      const delta = time - lastTime;
      lastTime = time;

      if (!state.paused) {
        dropCounter += delta;
        const speed = Math.max(80, 700 - (state.level - 1) * 45);
        if (dropCounter > speed) {
          dropCounter = 0;
          softDrop();
        }
      }

      drawBoard();
      drawNext();
      animId = requestAnimationFrame(loop);
    }

    document.addEventListener('keydown', (e) => {
      if (!state || state.over) return;
      if (e.key === 'p' || e.key === 'P') {
        state.paused = !state.paused;
        statusEl.textContent = state.paused ? 'Paused.' : 'Game running.';
        return;
      }
      if (state.paused) return;

      if (e.key === 'ArrowLeft') move(-1);
      else if (e.key === 'ArrowRight') move(1);
      else if (e.key === 'ArrowDown') softDrop();
      else if (e.key === 'ArrowUp') rotateCurrent();
      else if (e.key === ' ') {
        e.preventDefault();
        hardDrop();
      }
      drawBoard();
      drawNext();
      updateStats();
    });

    document.getElementById('startBtn').addEventListener('click', resetGame);

    themeBtn.addEventListener('click', () => {
      const root = document.documentElement;
      root.dataset.theme = root.dataset.theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('tetris-theme', root.dataset.theme);
      drawBoard();
      drawNext();
    });

    (function initTheme() {
      const stored = localStorage.getItem('tetris-theme');
      if (stored === 'light' || stored === 'dark') {
        document.documentElement.dataset.theme = stored;
      }
    })();

    resetGame();
  </script>
</body>
</html>
